name: CI

on:
  push:
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp-tienda-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp_tienda_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp_tienda_dev
      JWT_SECRET: ci-test-secret-no-usar-en-produccion
      INITIAL_ADMIN_PASSWORD: CiTestAdmin123!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: erp-tienda-backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar cliente de Prisma
        run: npx prisma generate

      - name: Lint (sin --fix; falla si hay algo por corregir)
        run: npm run lint:check

      - name: Build
        run: npx nest build

      - name: Tests unitarios
        run: npm run test

      - name: Tests e2e (contra Postgres real del job)
        run: npm run test:e2e

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp-tienda-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: erp-tienda-frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
