# Override file for docker-compose - solo para desarrollo local
# Úsalo con: docker-compose -f docker-compose.yml -f docker-compose.local.yml up

services:
  backend:
    build:
      context: ./erp-tienda-backend
      dockerfile: Dockerfile
    # En desarrollo, queremos ver los logs sin limpieza automática
    stdin_open: true
    tty: true
    # Aumentar límites de recursos si lo necesitas
    # mem_limit: 2g

  frontend:
    build:
      context: ./erp-tienda-frontend
      dockerfile: Dockerfile
    stdin_open: true
    tty: true
